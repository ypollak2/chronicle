# Chronicle .lore/ Freshness Gate
#
# The pre-push git hook (installed by `chronicle hooks install`) handles
# .lore/ updates locally — no CI secret or LLM key needed.
#
#   developer commits → pre-push hook runs chronicle process locally
#                     → commits .lore/ changes [skip ci]
#                     → pushes both together
#
# This workflow only runs `chronicle verify` as a CI gate to confirm
# the push arrived with a fresh store. It does NOT need an LLM API key.

name: Chronicle — Verify .lore/ Freshness

on:
  push:
    branches: [main]
    paths-ignore:
      - '.lore/**'
      - '.github/workflows/chronicle.yml'

concurrency:
  group: chronicle-verify
  cancel-in-progress: true

jobs:
  verify-lore:
    name: Verify .lore/ is fresh
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build chronicle
        run: npm run build

      - name: Verify .lore/ freshness
        # Exits 1 if .lore/ lags by more than 10 commits — indicates pre-push hook is not installed
        run: npx chronicle verify --max-lag 10 || true
        # || true: new repos without .lore/ bootstrapped should not fail CI
        # Remove '|| true' once the store is initialized and hooks are installed

      - name: Write freshness summary
        run: |
          STATUS=$(node packages/cli/dist/cli.js status --json 2>/dev/null || echo '{}')
          {
            echo "## Chronicle .lore/ Status"
            echo ""
            DECISIONS=$(echo "$STATUS" | node -e "try{const s=JSON.parse(require('fs').readFileSync('/dev/stdin','utf8'));process.stdout.write(String(s.decisions||0))}catch{process.stdout.write('?')}")
            ADRS=$(echo "$STATUS" | node -e "try{const s=JSON.parse(require('fs').readFileSync('/dev/stdin','utf8'));process.stdout.write(String(s.deepADRs||0))}catch{process.stdout.write('?')}")
            UNPROCESSED=$(echo "$STATUS" | node -e "try{const s=JSON.parse(require('fs').readFileSync('/dev/stdin','utf8'));process.stdout.write(String(s.unprocessedCommits||0))}catch{process.stdout.write('?')}")
            echo "| Decisions | ADRs | Unprocessed |"
            echo "|-----------|------|-------------|"
            echo "| $DECISIONS | $ADRS | $UNPROCESSED |"
            echo ""
            echo "> .lore/ is updated locally by the pre-push hook — no CI key required."
          } >> "$GITHUB_STEP_SUMMARY"
