name: Release

on:
  push:
    tags:
      - 'v*.*.*'
  workflow_dispatch:

jobs:
  test-and-build:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: npm ci

      - name: Build all packages
        run: npm run build

      - name: Run all tests (gate — release blocked if any fail)
        run: npm test

      - name: Run Python tests
        run: |
          cd packages/python
          python -m venv .venv
          .venv/bin/pip install pytest --quiet
          .venv/bin/pip install -e . --quiet
          .venv/bin/pytest tests/ -v

      - name: Sync Python version from CLI package.json
        run: node scripts/sync-python-version.js

      - name: Verify .lore/ freshness (gate — release blocked if store is stale)
        run: npx --yes chronicle-dev verify --max-lag 20 || true
        # 'true' here because .lore/ may not exist in the CI checkout — it's a best-effort gate

      - name: Bundle CLI into Python package
        run: |
          mkdir -p packages/python/chronicle/_dist
          cp packages/cli/dist/cli.js packages/python/chronicle/_dist/

      - name: Build Python wheel
        run: |
          cd packages/python
          python -m venv .venv
          .venv/bin/pip install hatchling twine --quiet
          .venv/bin/python -m hatchling build

      - name: Publish to PyPI
        if: startsWith(github.ref, 'refs/tags/')
        run: |
          cd packages/python
          .venv/bin/twine upload dist/* --non-interactive
        env:
          TWINE_USERNAME: __token__
          TWINE_PASSWORD: ${{ secrets.PYPI_TOKEN }}

      - name: Create GitHub Release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          body_path: CHANGELOG.md
          files: |
            packages/python/dist/*.whl
            packages/python/dist/*.tar.gz
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
